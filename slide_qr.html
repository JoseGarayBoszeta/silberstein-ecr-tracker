<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECR Tracker - Escanea el QR</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .slide {
            background: white;
            border-radius: 30px;
            padding: 50px 60px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }

        .school-name {
            color: #1a5f2a;
            font-size: 1.3em;
            font-weight: 600;
        }

        h1 {
            color: #667eea;
            font-size: 2.8em;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 35px;
        }

        .qr-container {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 25px;
            display: inline-block;
            margin-bottom: 30px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }

        .qr-code {
            width: 220px;
            height: 220px;
        }

        .scan-text {
            color: #764ba2;
            font-size: 1.4em;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .url-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: 600;
            display: inline-block;
            letter-spacing: 0.5px;
        }

        .short-url {
            margin-top: 15px;
            color: #888;
            font-size: 0.9em;
        }

        .footer {
            margin-top: 30px;
            color: #aaa;
            font-size: 0.85em;
        }

        /* Print styles for poster */
        @media print {
            body {
                background: white;
                padding: 0;
            }
            .slide {
                box-shadow: none;
                border: 3px solid #667eea;
            }
        }
    </style>
</head>
<body>
    <div class="slide">
        <div class="header">
            <img src="silberstein_logo.png" alt="Silberstein" class="logo">
            <span class="school-name">Silberstein Elementary</span>
        </div>

        <h1>ECR Tracker</h1>
        <p class="subtitle">5to Grado Spanish - Extended Constructed Response</p>

        <p class="scan-text">Escanea para ver tu progreso</p>

        <div class="qr-container">
            <img src="qr_code.png" alt="QR Code" class="qr-code">
        </div>

        <div class="url-box">
            bit.ly/ecr-tracker
        </div>

        <p class="short-url">
            josegarayboszeta.github.io/silberstein-ecr-tracker
        </p>

        <p class="footer">
            Haz clic en tu nombre para ver feedback detallado
        </p>
    </div>
</body>
</html>
